spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux: # 👈 Required for Spring Boot 3.5+ to avoid deprecation issues
          discovery:
            locator:
              enabled: true
          routes:
            # 1. Auth Service (Public - No Token Required)
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              # We do NOT use StripPrefix here so /auth/register reaches the controller

            # 2. Test Service (Protected - Requires JWT)
            - id: test-service
              uri: http://httpbin.org
              predicates:
                - Path=/test/**
              filters:
                - JwtAuthFilter
                - StripPrefix=1

server:
  port: 8000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Ensure these match your Auth Service exactly
jwt:
  secret: my-super-secret-key-my-super-secret-key
  expiration: 3600000

# Optional: Helpful for debugging routing issues in terminal
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG