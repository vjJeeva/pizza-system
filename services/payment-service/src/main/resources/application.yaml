server:
  port: 8084  # Distinct port for Payment Service

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3306/pizza_payment_db?createDatabaseIfNotExist=true
    username: root
    password: jeeva123 # Replace with your MySQL password
  jpa:
