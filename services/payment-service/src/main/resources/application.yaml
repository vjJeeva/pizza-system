    service-url:
      defaultZone: http://localhost:8761/eureka/

# Razorpay Credentials (Get these from your Razorpay Dashboard)
razorpay:
  key:
    id: YOUR_RAZORPAY_KEY_ID
    secret: YOUR_RAZORPAY_KEY_SECRET