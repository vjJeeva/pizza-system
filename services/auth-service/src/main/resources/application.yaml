spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/pizza_auth?createDatabaseIfNotExist=true
    username: root
    password: jeeva123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: my-super-secret-key-my-super-secret-key
  expiration: 3600000

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

